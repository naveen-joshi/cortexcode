name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 0.6.0)'
        required: true

jobs:
  publish-pypi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine toml

      - name: Update version in pyproject.toml
        if: github.event_name == 'workflow_dispatch'
        run: |
          python -c "
          import toml
          import sys
          with open('pyproject.toml', 'r') as f:
              data = toml.load(f)
          data['project']['version'] = '${{ github.event.inputs.version }}'
          with open('pyproject.toml', 'w') as f:
              toml.dump(data, f)
          print(f'Updated version to ${{ github.event.inputs.version }}')
          "

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -n "$TWINE_PASSWORD" ]; then
            twine upload dist/*
          else
            echo "Skipping PyPI publish - no token configured"
          fi

  publish-vscode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install VSCE
        run: npm install -g vsce

      - name: Update version in package.json
        if: github.event_name == 'workflow_dispatch'
        working-directory: cortexcode-vscode
        run: |
          npm version ${{ github.event.inputs.version }} --no-git-tag-version

      - name: Build VSIX
        working-directory: cortexcode-vscode
        run: vsce package

      - name: Publish to VS Code Marketplace
        env:
          VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}
        working-directory: cortexcode-vscode
        run: |
          if [ -n "$VSCE_TOKEN" ]; then
            vsce publish
          else
            echo "Skipping VSCode publish - no token configured"
          fi

  create-github-release:
    runs-on: ubuntu-latest
    needs: [publish-pypi]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract changelog for release
        id: changelog
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION=$(grep -m1 '^## \[' CHANGELOG.md | sed 's/## \[//;s/\]//')
          fi
          CONTENT=$(sed -n "/## \[$VERSION\]/,/^## \[/p" CHANGELOG.md | head -n -1 | tail -n +2)
          CONTENT=$(echo "$CONTENT" | sed 's/\[//g;s/\]//g' | sed 's/(https[^)]*)//g')
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.event.inputs.version }} \
            --title "CortexCode v${{ github.event.inputs.version }}" \
            --notes "${{ steps.changelog.outputs.content }}"
