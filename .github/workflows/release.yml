name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish-pypi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine toml

      - name: Update version in pyproject.toml
        run: |
          python -c "
          import toml
          with open('pyproject.toml', 'r') as f:
              data = toml.load(f)
          data['project']['version'] = '${{ steps.version.outputs.version }}'
          with open('pyproject.toml', 'w') as f:
              toml.dump(data, f)
          print('Updated version to ${{ steps.version.outputs.version }}')
          "

      - name: Build package
        run: python -m build

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          if [ -n "$TWINE_PASSWORD" ]; then
            twine upload dist/*
          else
            echo "Skipping PyPI publish - no token configured"
          fi

  publish-vscode:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install VSCE
        run: npm install -g vsce

      - name: Update version in package.json
        working-directory: cortexcode-vscode
        run: |
          npm version ${{ steps.version.outputs.version }} --no-git-tag-version

      - name: Build VSIX
        working-directory: cortexcode-vscode
        run: vsce package

      - name: Publish to VS Code Marketplace
        env:
          VSCE_TOKEN: ${{ secrets.VSCE_TOKEN }}
        working-directory: cortexcode-vscode
        run: |
          if [ -n "$VSCE_TOKEN" ]; then
            vsce publish
          else
            echo "Skipping VSCode publish - no token configured"
          fi

  create-github-release:
    runs-on: ubuntu-latest
    needs: [publish-pypi]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Extract changelog for release
        id: changelog
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CONTENT=$(sed -n "/## \[$VERSION\]/,/^## \[/p" CHANGELOG.md | head -n -1 | tail -n +2)
          CONTENT=$(echo "$CONTENT" | sed 's/\[//g;s/\]//g' | sed 's/(https[^)]*)//g')
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "CortexCode v${{ steps.version.outputs.version }}" \
            --notes "${{ steps.changelog.outputs.content }}"
